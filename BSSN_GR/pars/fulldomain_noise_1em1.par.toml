### =================================================
### BSSN <-> CCZ4 FULL-DOMAIN noise IC, amplitude 1e-1
### =================================================
###
### "Part B" noise test (EWH): random noise filling the ENTIRE grid, no
### Gaussian envelope. Companion to
### /home/denv/research/ccz4-gr/pars/fulldomain_noise_1em1.par.toml.
### Probes whether the nonlinear BSSN system damps broadband noise or
### couples it into coherent features, with L2 norms taken over a uniformly
### weighted grid.
###
### IC: BSSN_ID_TYPE = 3 (noiseData) -- per-gridpoint random perturbation of
### flat space, amplitude = BSSN_NOISE_AMP (this file: 1e-1). This is BSSN's
### native full-domain random noise; amplitude is now runtime-controlled
### (was hardcoded 1e-8 in grUtils.cpp). NOTE: different RNG/grid traversal
### than CCZ4 id=5, so NOT bit-for-bit parity -- compare L2-norm-vs-time and
### emergent structure, not pointwise diffs.
###
### GRID: UNIFORM. Full-domain random noise is incompatible with deep wavelet
### AMR (it would refine the whole box to maxdepth). Block adaptivity with the
### block covering the WHOLE domain seeds a uniform grid at level
### (MAXDEPTH - 2) = 6 -> a uniform 2^6 = 64 cells/dim grid over [-50,50]^3.
### CCZ4 uses the identical convention, so the meshes match and the L2 norms
### are directly comparable. Bump MAXDEPTH (both sides) for production;
### level = MAXDEPTH - 2.
###
### The three full-domain pars are identical except BSSN_NOISE_AMP and prefixes.

